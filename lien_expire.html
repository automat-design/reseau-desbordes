<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lien expiré — Réseau Desbordes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f7f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #fef3cd;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 1rem;
    line-height: 1.4;
  }
  .subtitle {
    font-size: 14px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .divider {
    border: none;
    border-top: 1px solid #ebe8e2;
    margin-bottom: 1.5rem;
  }
  .footer {
    font-size: 13px;
    color: #888;
    line-height: 1.6;
  }
  .footer strong {
    color: #555;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
  </div>
  <h1>Ce lien n'est plus disponible</h1>
  <p class="subtitle">
    Le délai de réponse pour ce dossier est dépassé. Il a déjà été transmis à un autre partenaire du réseau.
    <br><br>
    Vous recevrez prochainement d'autres opportunités.
  </p>
  <hr class="divider">
  <p class="footer">
    <strong>Réseau Desbordes — Gironde Artisans Confiance</strong>
  </p>
</div>
</body>
</html>
